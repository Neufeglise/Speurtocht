<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14241F">
<title>Speurtocht</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
:root{
  --bg:#14241f; --surface:#1e332b; --surface-2:#16291f; --line:#2c463a;
  --paper:#f2ede0; --sage:#8fa89a; --amber:#e8a33d; --mint:#7fc8a9; --rood:#e07a5f;
  --display:"Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  --body:"Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{ -webkit-text-size-adjust:100%; }
body{
  font-family:var(--body);
  background:radial-gradient(120% 80% at 50% -10%, #1c3329 0%, var(--bg) 55%) fixed;
  color:var(--paper); line-height:1.55; min-height:100dvh;
  padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 40px);
  max-width:560px; margin-inline:auto;
}
.kop{ text-align:center; margin-bottom:22px; }
.eyebrow{ font-family:var(--display); font-size:.72rem; font-weight:600;
  letter-spacing:.32em; text-transform:uppercase; color:var(--amber); }
.kop h1{ font-family:var(--display); font-weight:700;
  font-size:clamp(1.7rem, 7vw, 2.3rem); line-height:1.05; letter-spacing:-.01em;
  margin:.35em 0 .25em; }
.kop .intro{ color:var(--sage); font-size:.95rem; max-width:42ch; margin-inline:auto; }

.spoor{ display:flex; align-items:center; gap:0; overflow-x:auto;
  padding:14px 4px 16px; margin-bottom:8px; scrollbar-width:none; }
.spoor::-webkit-scrollbar{ display:none; }
.knoop{ flex:0 0 auto; width:26px; height:26px; border-radius:50%;
  display:grid; place-items:center; font-family:var(--display); font-weight:700;
  font-size:.74rem; border:2px solid var(--line); color:var(--sage);
  background:var(--surface-2); transition:transform .25s ease; }
.draad{ flex:1 1 14px; min-width:14px; height:2px; background:var(--line); }
.knoop.done{ background:var(--mint); border-color:var(--mint); color:var(--bg); }
.knoop.now{ border-color:var(--amber); color:var(--amber); transform:scale(1.18);
  box-shadow:0 0 0 4px rgba(232,163,61,.15); }
.draad.done{ background:var(--mint); }

.lijst{ display:flex; flex-direction:column; gap:14px; }
.stap{ border:1px solid var(--line); border-radius:18px; background:var(--surface); overflow:hidden; }
.stap.af{ background:transparent; border-style:dashed; cursor:pointer; }
.stap.af .body{ padding:12px 16px; }
.stap.af .stap-titel{ font-size:.98rem; color:var(--mint); }
.stap.af .route, .stap.af .opdracht, .stap.af .slot, .stap.af .fotoblok{ display:none; }
.stap.af.open .route, .stap.af.open .opdracht, .stap.af.open .fotoblok{ display:block; margin-top:12px; }
.jouw-antwoord{ padding:12px 14px; border-radius:12px;
  background:rgba(127,200,169,.08); border:1px solid rgba(127,200,169,.25); }
.jouw-antwoord .label{ color:var(--mint); }
.stap.af .jouw-antwoord{ display:none; }
.stap.af.open .jouw-antwoord{ display:block; margin-top:12px; }
.stap.af .stap-head .chev{ margin-left:auto; color:var(--mint); font-size:.8rem;
  transition:transform .2s ease; }
.stap.af.open .stap-head .chev{ transform:rotate(90deg); }
.stap.slot-dicht{ background:var(--surface-2); border-style:dashed; }
.stap.slot-dicht .body{ padding:16px; display:flex; align-items:center; gap:12px; }
.stap.slot-dicht .route, .stap.slot-dicht .opdracht, .stap.slot-dicht .slot{ display:none; }
.body{ padding:20px; }
.stap-head{ display:flex; align-items:baseline; gap:10px; margin-bottom:2px; }
.nummer{ font-family:var(--display); font-weight:700; font-size:.8rem;
  letter-spacing:.1em; color:var(--amber); }
.stap.af .nummer{ color:var(--mint); }
.stap.slot-dicht .nummer{ color:var(--sage); }
.stap-titel{ font-family:var(--display); font-weight:600; font-size:1.3rem;
  line-height:1.15; letter-spacing:-.01em; margin-bottom:12px; }
.slot-dicht .stap-titel{ font-size:1rem; color:var(--sage); margin:0; }
.label{ font-family:var(--display); font-size:.66rem; font-weight:600;
  letter-spacing:.2em; text-transform:uppercase; color:var(--sage);
  display:block; margin-bottom:4px; }
.route{ margin-bottom:4px; }
.route p, .opdracht p{ font-size:1rem; }
.opdracht{ margin-top:16px; padding:14px 16px; background:rgba(232,163,61,.08);
  border:1px solid rgba(232,163,61,.25); border-radius:12px; }
.opdracht .label{ color:var(--amber); }

.slot{ margin-top:18px; }
.knop{ display:block; width:100%; font-family:var(--display); font-weight:600;
  font-size:1rem; padding:15px 18px; border:none; border-radius:13px;
  background:var(--amber); color:#221603; cursor:pointer;
  -webkit-tap-highlight-color:transparent; transition:transform .12s ease, filter .12s ease; }
.knop:active{ transform:scale(.98); }
.knop:hover{ filter:brightness(1.05); }
.knop:disabled{ opacity:.55; cursor:default; }
.knop.secundair{ background:transparent; color:var(--sage); border:1px solid var(--line); }

.codevak{ display:flex; gap:8px; }
.codevak input{ flex:1; min-width:0; font-family:var(--body); font-size:1.05rem;
  padding:14px 16px; border-radius:13px; border:1px solid var(--line);
  background:var(--surface-2); color:var(--paper); }
.codevak input::placeholder{ color:var(--sage); opacity:.7; }
.codevak input:focus{ outline:none; border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(232,163,61,.18); }
.codevak .knop{ width:auto; flex:0 0 auto; padding-inline:22px; }
.hint{ font-size:.85rem; color:var(--sage); margin-top:10px; }
.fout{ font-size:.9rem; color:var(--rood); margin-top:10px; font-weight:500; }
.slotje{ font-size:1.3rem; flex:0 0 auto; opacity:.6; }

.fotoblok{ margin-top:16px; }
.fotoblok img{ display:block; width:100%; height:auto; border-radius:12px;
  border:1px solid var(--line); }
.fotoblok figcaption{ margin-top:8px; font-size:.85rem; color:var(--sage);
  text-align:center; font-style:italic; }

.slot-scherm{ position:fixed; inset:0; z-index:50;
  background:radial-gradient(120% 80% at 50% -10%, #1c3329 0%, var(--bg) 55%);
  display:grid; place-items:center; padding:24px;
  padding-top:calc(env(safe-area-inset-top) + 24px); }
.slot-scherm[hidden]{ display:none; }
.slot-kaart{ width:100%; max-width:360px; text-align:center; }
.slot-kaart h1{ font-family:var(--display); font-weight:700;
  font-size:clamp(1.6rem,7vw,2.1rem); line-height:1.1; margin:.3em 0 .45em;
  letter-spacing:-.01em; }
.slot-uitleg{ color:var(--sage); font-size:.95rem; margin-bottom:20px; }
.slot-kaart .fout{ text-align:left; }

.modal-overlay{ position:fixed; inset:0; z-index:80; background:rgba(8,16,12,.74);
  display:grid; place-items:center; padding:24px; }
.modal-kaart{ position:relative; width:100%; max-width:380px; background:var(--surface);
  border:1px solid var(--amber); border-radius:18px; padding:30px 22px 24px; text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5); }
.modal-sluit{ position:absolute; top:10px; right:12px; width:36px; height:36px;
  border-radius:50%; border:1px solid var(--line); background:var(--surface-2);
  color:var(--paper); font-size:1.4rem; line-height:1; cursor:pointer; padding:0;
  display:grid; place-items:center; }
.modal-sluit:hover{ border-color:var(--amber); }
.modal-kaart h2{ font-family:var(--display); font-weight:700; font-size:1.45rem;
  line-height:1.15; margin:.35em 0 .45em; color:var(--paper); }
.modal-kaart p{ color:var(--paper); font-size:1rem; line-height:1.55; }

.route-knop{ position:fixed; right:14px; bottom:calc(env(safe-area-inset-bottom) + 14px); z-index:45;
  background:var(--amber); color:#221603; border:none; border-radius:24px; padding:11px 16px;
  font-family:var(--display); font-weight:600; font-size:.88rem; cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.45); }
.route-modal{ position:fixed; inset:0; z-index:70; background:#0c1712; display:none; flex-direction:column; }
.route-modal.open{ display:flex; }
.route-modal header{ display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; color:var(--paper); }
.route-modal header b{ font-family:var(--display); font-size:1.05rem; }
.route-sluit{ background:var(--surface-2); color:var(--paper); border:1px solid var(--line);
  border-radius:50%; width:36px; height:36px; font-size:1.3rem; cursor:pointer; }
#route-map{ flex:1; min-height:0; background:#1c3329; }
.route-modal .balk{ padding:12px 16px; background:var(--surface); color:var(--paper);
  display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
.route-status{ color:var(--sage); font-size:.85rem; }
.route-tijd{ font-family:var(--display); font-weight:700; }
.route-dl{ background:var(--mint); color:#08130d; border:none; border-radius:10px;
  padding:10px 14px; font-weight:600; font-family:var(--display); cursor:pointer; }

/* GPS-blok */
.gps{ margin-top:18px; padding:14px 16px; border-radius:12px;
  background:rgba(127,200,169,.07); border:1px solid rgba(127,200,169,.22); }
.gps .label{ color:var(--mint); }
.gps-status{ font-size:.9rem; color:var(--sage); margin-top:10px; min-height:1.2em; }
.gps-status.ok{ color:var(--mint); font-weight:500; }
.gps-status.err{ color:var(--rood); font-weight:500; }
.gps .knop{ margin-top:12px; }
.afstandsbalk{ height:6px; border-radius:6px; background:var(--surface-2);
  margin-top:12px; overflow:hidden; }
.afstandsbalk > i{ display:block; height:100%; width:0; background:var(--mint);
  transition:width .4s ease; }

:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }

.finale{ text-align:center; padding:40px 24px; border:1px solid var(--mint);
  border-radius:20px; background:linear-gradient(180deg, rgba(127,200,169,.12), transparent);
  margin-top:6px; }
.finale .vlag{ font-size:3rem; line-height:1; }
.finale h2{ font-family:var(--display); font-size:1.8rem; margin:.4em 0 .3em; }
.finale p{ color:var(--paper); max-width:36ch; margin-inline:auto; }

.voet{ margin-top:30px; text-align:center; }
.reset{ background:none; border:none; color:var(--sage); font-family:var(--body);
  font-size:.85rem; text-decoration:underline; cursor:pointer; padding:8px; }

@keyframes onthul{ from{opacity:0; transform:translateY(14px) scale(.99);} to{opacity:1; transform:none;} }
.onthul{ animation:onthul .45s cubic-bezier(.22,1,.36,1) both; }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }
</style>
</head>
<body>

<!-- ================================================================= -->
<!--                                                                   -->
<!--   ✏️  HIER PAS JE DE SPEURTOCHT AAN                               -->
<!--                                                                   -->
<!--   Per stap kun je instellen:                                      -->
<!--     titel    – korte naam van de stap                             -->
<!--     route    – uitleg hoe je naar het punt loopt                  -->
<!--     opdracht – (optioneel) de taak/vraag op dat punt. Leeg = geen -->
<!--                                                                   -->
<!--   slot = hoe de volgende stap vrijkomt:                           -->
<!--     { type:"knop", knoptekst:"Stap voltooid" }                    -->
<!--          → op een knop drukken (op vertrouwen)                    -->
<!--     { type:"code", antwoord:"42", hint:"Twee cijfers" }           -->
<!--          → het juiste antwoord invullen (hoofdletters maken niet  -->
<!--            uit; hint is optioneel)                                 -->
<!--                                                                   -->
<!--   gps = (OPTIONEEL) controle of de speler echt op de plek staat.  -->
<!--     gps:{ lat:52.3580, lng:4.8686, radius:30 }                    -->
<!--       lat/lng = coördinaten van het punt                          -->
<!--       radius  = hoe dichtbij (in meters) iemand moet zijn         -->
<!--                                                                   -->
<!--   Hoe vind je lat/lng? Open Google Maps, houd lang op de plek     -->
<!--   gedrukt (mobiel) of klik er met rechts op (computer). De twee   -->
<!--   getallen die verschijnen zijn lat en lng.                       -->
<!--                                                                   -->
<!--   Combineren mag: een stap met gps + code betekent dat iemand     -->
<!--   eerst op de plek moet staan en dáár de vraag moet beantwoorden. -->
<!--                                                                   -->
<!--   ⚠️ GPS werkt alleen als het bestand via een https-link wordt    -->
<!--   geopend (bijv. GitHub Pages of Netlify), niet als los bestand.  -->
<!--                                                                   -->
<!-- ================================================================= -->
<script>

  // Wachtwoord dat ingevoerd moet worden voordat de speurtocht begint.
  // Hoofdletters maken niet uit. Laat leeg ("") om het wachtwoord uit te zetten.

  // Failsafe: na dit aantal mislukte pogingen (fout antwoord OF mislukte
  // locatiecheck) wordt een stap alsnog automatisch goedgekeurd, zodat
  // niemand definitief vastloopt. Verhoog/verlaag naar wens.
  failsafe: 10,

  // (Optioneel) Endpoint waar de tijdsduur na afloop naartoe wordt gestuurd,
  // bijvoorbeeld een gratis Formspree-URL. Laat leeg ("") als je dit niet gebruikt.
  resultatenEndpoint: "",

  finale: {
    vlag: "🏁",
    titel: "Goed bezig Kimmie!",
    tekst: "De speurtocht is voltooid ouwe opsporingsambtenaar!"
  },

  stappen: [
//1
    {
      titel: "Start",
      route: "Je begint vandaag bij jouw nederige stulpje aan de Nederstraat. Loop je voordeur uit en kijk naar de overkant van de straat. Welke kleur is de voorgevel van nummer 12?",
      slot: { type:"code", antwoord:"wit", hint:"zwart" }
    },
//2

//3
    {
      titel: "De Havenkraan was wel makkelijk he?",
      route: "Steek nu de brug over en sla rechtsaf de Dwarskaai op. Stop bij de grote 'restafvalcontainter'",
      opdracht: "Aan de overkant is als het goed is een wijnhandel/restaurant. Welk dier komt in deze naam voor?",
      gps: { lat:51.5010, lng:3.6199, radius:10 },
      slot: { type:"code", antwoord:"hert", hint:"Je ziet ze vliegennnn" }
    },
//4
    {
      titel: "Misschien moet het wat moeilijker..",
      route: "Ga naar de Graanbeurs op het Damplein en ga in het midden staan.",

//5

      opdracht: "Sta je bij het huis? Vul dan de naam (in hoofdletters) in van de winkel die zich hiertegenover bevindt.",

    },
//6
    {
      titel: "Hoelang is het geleden dat je nieuwe schoenen hebt gekocht?",
      route: "Loop een rondje door de COCO.",
      opdracht: "Kijk of er nog iets leuks tussenzit voor jezelf.",
      slot: { type:"knop", knoptekst:"Ik heb mezelf getrakteerd op nieuwe schoenen." }
    },
//7
    {
      titel: "Mijn nieuwe patta's lopen nog moeilijk, graag wat langzamer..",

      slot: { type:"knop", knoptekst:"Er zit een blaadje in mijn neus. Ik heb helemaal geen neus." }
    },
//8
    {
      titel: "Het is recentelijk immaterieel erfgoed geworden..",
      route: "Loop Onder Den Toren door en sla linksaf het plein op in de richting van de Lange Delft. Halverwege kom je een standbeeld tegen.",
      opdracht: "Uit welk jaar komt dit standbeeld? ",
      gps: { lat:51.4992710, lng:3.6150786, radius:10 },

    },
//9

      titel: "En we gaan dooorrrrrr",

    },
//10
    {
      titel: "Je kan in ieder geval nog tellen dus..",

    },
//12

      titel: "Hoelang is het geleden dat je binnen hebt gekeken naar een leuk boek?",

    },
//14
    {

    },
//15

      titel: "Het einde is nabij",
      route: "Verlaat met je volle buik Greenwoods en loop in de richting van de kruising van Plein 1940, de Pottenmarkt en de Markt. ",

      gps: { lat:51.4981744, lng:3.6106047, radius:10 },
      slot: { type:"knop", knoptekst:"Jur ligt hier nog steeds op de grond" }
    },
//16
    {
      titel: "Het einde van deze route",
      route: "Nu je hier toch staat, loop gezellig even naar binnen bij Sev (of een ander café)",
      opdracht: "Bestel een kopje koffie om het zojuist gegeten eten weg te spoelen. Tip: ijskoffie!",
      gps: { lat:51.4983526, lng:3.6107056, radius:10 },

    },
//17
    {
      titel: "",
      route: "",
      opdracht: "",
      // Zet de foto in dezelfde GitHub-repo (bijv. een bestand 'foto.jpg')
      // en zet hieronder de bestandsnaam. Een internet-link (https://...) mag ook.
      foto: "foto.jpg",
      fotobijschrift: "",
      slot: { type:"knop", knoptekst:"Yo Yoo Yooooooo" }
    }
  ]
};
</script>

<div id="slot-scherm" class="slot-scherm">
  <div class="slot-kaart">
    <div class="eyebrow">Beveiligd</div>
    <h1 id="slot-titel">Speurtocht</h1>
    <p class="slot-uitleg">Voer het wachtwoord in om te beginnen.</p>
    <div class="codevak">
      <input id="slot-input" type="text" inputmode="text" autocomplete="off"
             autocapitalize="off" enterkeyhint="go" placeholder="Wachtwoord…"
             aria-label="Wachtwoord invullen">
      <button id="slot-knop" class="knop">Start</button>
    </div>
    <p id="slot-fout" class="fout" style="display:none">Onjuist wachtwoord. Probeer het opnieuw.</p>
  </div>
</div>

<header class="kop">
  <div class="eyebrow">Speurtocht</div>
  <h1 id="titel"></h1>
  <p class="intro" id="intro"></p>
</header>

<nav class="spoor" id="spoor" aria-label="Voortgang"></nav>
<main class="lijst" id="lijst"></main>

<footer class="voet">
  <button class="reset" id="reset">Speurtocht opnieuw beginnen</button>
</footer>

<script>
(function(){
  "use strict";

  const data = SPEURTOCHT;
  const totaal = data.stappen.length;
  const OPSLAG = "speurtocht_voortgang_v1";
  const FAILSAFE = (typeof data.failsafe === "number" && data.failsafe > 0) ? data.failsafe : 10;

  // Testmodus: voeg ?test toe aan de link om locatiechecks te kunnen overslaan.
  const TESTMODUS = new URLSearchParams(location.search).has("test");
  if (TESTMODUS){
    const b=document.createElement("div");
    b.textContent="TESTMODUS — locatiechecks kunnen worden overgeslagen";
    b.style.cssText="position:fixed;top:0;left:0;right:0;z-index:60;background:#e8a33d;color:#221603;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:.04em;text-align:center;padding:6px 10px;";
    document.body.appendChild(b);
  }

  let voltooid = 0;
  try {
    const o = localStorage.getItem(OPSLAG);
    if (o !== null) voltooid = Math.min(parseInt(o,10) || 0, totaal);
  } catch(e){}
  function bewaar(){ try { localStorage.setItem(OPSLAG, String(voltooid)); } catch(e){} }

  // Onthoudt het ingetypte antwoord per stap (ook na herladen).
  const ANTW = "speurtocht_antwoorden_v1";
  let antwoorden = {};
  try { const a = localStorage.getItem(ANTW); if (a) antwoorden = JSON.parse(a) || {}; } catch(e){}
  function bewaarAntwoord(index, waarde, correct){
    antwoorden[index] = { waarde: waarde, correct: correct };
    try { localStorage.setItem(ANTW, JSON.stringify(antwoorden)); } catch(e){}
  }

  document.getElementById("titel").textContent = data.titel;
  document.getElementById("intro").textContent = data.intro;
  document.title = data.titel;

  const lijstEl = document.getElementById("lijst");
  const spoorEl = document.getElementById("spoor");
  let netOntgrendeld = -1;
  // onthoudt per stap of de GPS-check (in deze sessie) al geslaagd is
  const gpsGehaald = {};

  function normaliseer(s){ return String(s).trim().toLowerCase().replace(/\s+/g," "); }

  // afstand tussen twee coördinaten in meters (Haversine)
  function afstandMeter(lat1,lng1,lat2,lng2){
    const R=6371000, t=Math.PI/180;
    const dLat=(lat2-lat1)*t, dLng=(lng2-lng1)*t;
    const a=Math.sin(dLat/2)**2 + Math.cos(lat1*t)*Math.cos(lat2*t)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  function leesbaar(m){ return m>=1000 ? (m/1000).toFixed(1)+" km" : Math.round(m)+" m"; }

  // Algemene pop-up (donkere overlay, kruisje rechtsboven, sluit-callback).
  function toonPopup(eyebrowTekst, titel, body, naDicht){
    const ov = document.createElement("div"); ov.className="modal-overlay";
    const kaart = document.createElement("div"); kaart.className="modal-kaart onthul";
    kaart.setAttribute("role","dialog"); kaart.setAttribute("aria-modal","true");
    const sluit = document.createElement("button"); sluit.className="modal-sluit";
    sluit.setAttribute("aria-label","Sluiten"); sluit.textContent="×";
    const eyebrow = document.createElement("div"); eyebrow.className="eyebrow"; eyebrow.textContent=eyebrowTekst;
    const h = document.createElement("h2"); h.textContent=titel;
    const p = document.createElement("p"); p.textContent=body;
    kaart.appendChild(sluit); kaart.appendChild(eyebrow); kaart.appendChild(h); kaart.appendChild(p);
    ov.appendChild(kaart); document.body.appendChild(ov);
    function dicht(){ ov.remove(); document.removeEventListener("keydown", esc); if (typeof naDicht==="function") naDicht(); }
    function esc(e){ if (e.key==="Escape") dicht(); }
    sluit.addEventListener("click", dicht);
    document.addEventListener("keydown", esc);
    sluit.focus();
  }

  // Pop-up bij failsafe (na te veel fouten). Teksten gerust aanpassen.
  function toonFailsafePopup(naDicht){
    const teksten = [
      { titel:"Vooruit dan maar… 🙄", body:"Tien keer fout achter elkaar. Tíén! Eerlijk: óf jij bent niet de speurneus die we dachten, óf Neuf heeft deze vraag knullig in elkaar geflanst. We houden het gezellig op dat laatste. Je mag door." },
      { titel:"De failsafe grijpt in 🚨", body:"Na 10 mislukte pogingen concludeert het systeem: ofwel jij bent hopeloos, ofwel Neuf was niet helemaal lekker in z'n bol bij het maken van deze vraag. Beide kan natuurlijk ook. Je wordt alsnog doorgelaten." },
      { titel:"Okééé, je mag door 🤷", body:"Tien keer raak gemist — bijna een prestatie op zich. Óf de maker (Neuf, ja) is gewoon gek. We drukken een oogje toe en sturen je naar de volgende stap." }
    ];
    const k = teksten[Math.floor(Math.random()*teksten.length)];
    toonPopup("Failsafe", k.titel, k.body, naDicht);
  }

  // Pop-up bij een goed beantwoorde vraag. Teksten gerust aanpassen.
  function toonSuccesPopup(naDicht){
    const teksten = [
      { titel:"Goed gezien! 🎉", body:"Helemaal correct. Je bent toch een echte speurneus. Door naar de volgende!" },
      { titel:"Bingo! ✅", body:"Dat klopt als een bus. Neuf wist wel dat je dit kon. Op naar het volgende raadsel." },
      { titel:"Kimberly: 1 — de stad: 0 🕵️", body:"Juist beantwoord en lekker bezig. Verder met de tocht!" },
      { titel:"Toppie! 🙌", body:"Correct! Even genieten van dit moment van glorie, en dan snel door." },
      { titel:"Precies goed! 🌟", body:"Je hebt 'm. Op dit tempo ben je zo bij de koffie. Volgende stap!" }
    ];
    const k = teksten[Math.floor(Math.random()*teksten.length)];
    toonPopup("Goed!", k.titel, k.body, naDicht);
  }

  function voltooiStap(){
    if (voltooid < totaal){
      voltooid++; netOntgrendeld = voltooid; bewaar(); render();
      requestAnimationFrame(()=>{
        const doel = document.querySelector(".stap.actief") || document.querySelector(".finale");
        if (doel) doel.scrollIntoView({behavior:"smooth", block:"center"});
      });
    }
  }

  function bouwSpoor(){
    spoorEl.innerHTML = "";
    for (let i=0;i<totaal;i++){
      if (i>0){ const d=document.createElement("div");
        d.className="draad"+(i<=voltooid?" done":""); spoorEl.appendChild(d); }
      const k=document.createElement("div"); let cls="knoop";
      if (i<voltooid){ cls+=" done"; k.textContent="✓"; }
      else if (i===voltooid){ cls+=" now"; k.textContent=i+1; }
      else { k.textContent=i+1; }
      k.className=cls; spoorEl.appendChild(k);
    }
  }

  // bouwt de code/knop-afhandeling (wordt pas getoond als GPS geslaagd is)
  function maakSlot(stap, index){
    const wrap=document.createElement("div"); wrap.className="slot";
    const slot=stap.slot || {type:"knop"};
    if (slot.type==="code"){
      const vak=document.createElement("div"); vak.className="codevak";
      const input=document.createElement("input");
      input.type="text"; input.setAttribute("autocomplete","off");
      input.setAttribute("autocapitalize","off"); input.setAttribute("enterkeyhint","go");
      input.placeholder="Antwoord…"; input.setAttribute("aria-label","Antwoord invullen");
      const knop=document.createElement("button"); knop.className="knop"; knop.textContent="Check";
      const fout=document.createElement("p"); fout.className="fout"; fout.style.display="none";
      fout.textContent="Dat klopt nog niet. Probeer het opnieuw.";
      let pogingen=0;
      function probeer(){
        if (normaliseer(input.value)===normaliseer(slot.antwoord)){
          bewaarAntwoord(index, input.value.trim(), true); toonSuccesPopup(voltooiStap);
        }
        else {
          pogingen++;
          if (pogingen>=FAILSAFE){ bewaarAntwoord(index, input.value.trim(), false); toonFailsafePopup(voltooiStap); return; }
          fout.style.display="block"; input.focus(); input.select();
        }
      }
      knop.addEventListener("click",probeer);
      input.addEventListener("keydown",e=>{ if(e.key==="Enter") probeer(); });
      input.addEventListener("input",()=>{ fout.style.display="none"; });
      vak.appendChild(input); vak.appendChild(knop); wrap.appendChild(vak);
      if (slot.hint){ const h=document.createElement("p"); h.className="hint";
        h.textContent="Tip: "+slot.hint; wrap.appendChild(h); }
      wrap.appendChild(fout);
    } else {
      const knop=document.createElement("button"); knop.className="knop";
      knop.textContent=slot.knoptekst||"Stap voltooid";
      knop.addEventListener("click",voltooiStap); wrap.appendChild(knop);
    }
    return wrap;
  }

  // GPS-poort: speler moet binnen de straal staan voordat de slot verschijnt
  function maakGps(stap, index, naSucces){
    const box=document.createElement("div"); box.className="gps";
    box.innerHTML='<span class="label">Locatie</span>'+
      '<p style="font-size:.95rem">Sta je op de juiste plek? Controleer je locatie om verder te gaan.</p>';
    const balk=document.createElement("div"); balk.className="afstandsbalk";
    const vul=document.createElement("i"); balk.appendChild(vul);
    const status=document.createElement("p"); status.className="gps-status";
    const knop=document.createElement("button"); knop.className="knop";
    knop.textContent="📍 Controleer mijn locatie";
    let gpsPogingen=0;

    knop.addEventListener("click",()=>{
      if (!navigator.geolocation){
        status.className="gps-status err";
        status.textContent="Deze telefoon/browser geeft geen locatie door. Open de speurtocht via een https-link.";
        return;
      }
      knop.disabled=true; status.className="gps-status";
      status.textContent="Locatie bepalen…";
      navigator.geolocation.getCurrentPosition(
        pos=>{
          knop.disabled=false;
          const d=afstandMeter(pos.coords.latitude,pos.coords.longitude,stap.gps.lat,stap.gps.lng);
          const r=stap.gps.radius||30;
          if (d<=r){
            status.className="gps-status ok";
            status.textContent="Je bent op de juiste plek ✓";
            vul.style.width="100%";
            gpsGehaald[index]=true;
            setTimeout(naSucces,500);
          } else {
            gpsPogingen++;
            if (gpsPogingen>=FAILSAFE){ vul.style.width="100%";
              status.className="gps-status ok"; status.textContent="Je mag door ✓";
              toonFailsafePopup(()=>{ gpsGehaald[index]=true; naSucces(); }); return; }
            status.className="gps-status err";
            status.textContent="Je bent nog ongeveer "+leesbaar(d)+" van het punt. Loop wat dichterbij en probeer opnieuw.";
            // balk vult naarmate je dichterbij komt (tot 5x de straal)
            const pct=Math.max(4, Math.min(95, 100*(1-(d-r)/(r*5))));
            vul.style.width=pct+"%";
          }
        },
        err=>{
          knop.disabled=false;
          gpsPogingen++;
          if (gpsPogingen>=FAILSAFE){
            status.className="gps-status ok"; status.textContent="Je mag door ✓";
            toonFailsafePopup(()=>{ gpsGehaald[index]=true; naSucces(); }); return; }
          status.className="gps-status err";
          if (err.code===1) status.textContent="Geen toegang tot je locatie. Sta het toe via de melding of in de instellingen en probeer opnieuw.";
          else if (err.code===2) status.textContent="Locatie niet beschikbaar. Zorg dat GPS aanstaat en probeer het buiten opnieuw.";
          else if (err.code===3) status.textContent="Het duurde te lang. Probeer het opnieuw.";
          else status.textContent="Locatie ophalen lukte niet. Probeer het opnieuw.";
        },
        { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
      );
    });

    box.appendChild(balk); box.appendChild(status); box.appendChild(knop);

    if (TESTMODUS){
      const skip=document.createElement("button");
      skip.className="knop secundair";
      skip.style.marginTop="10px";
      skip.textContent="⏭️ Locatie overslaan (test)";
      skip.addEventListener("click",()=>{ gpsGehaald[index]=true; naSucces(); });
      box.appendChild(skip);
    }
    return box;
  }

  function maakInteractie(stap,index,body){
    const heeftGps = stap.gps && !gpsGehaald[index];
    if (heeftGps){
      body.appendChild(maakGps(stap,index,()=>{
        // GPS geslaagd → bij een knop-slot meteen klaar, anders slot tonen
        if (!stap.slot || stap.slot.type==="knop"){ voltooiStap(); }
        else { render(); }
      }));
    } else {
      body.appendChild(maakSlot(stap,index));
    }
  }

  function maakStap(stap,index){
    const el=document.createElement("section");
    const isAf=index<voltooid, isNu=index===voltooid, isDicht=index>voltooid;
    el.className="stap"+(isAf?" af":"")+(isNu?" actief":"")+(isDicht?" slot-dicht":"");
    if (index===netOntgrendeld && isNu) el.classList.add("onthul");
    const body=document.createElement("div"); body.className="body";

    if (isDicht){
      const slotje=document.createElement("span"); slotje.className="slotje"; slotje.textContent="🔒";
      const t=document.createElement("div");
      t.innerHTML='<span class="nummer">Stap '+(index+1)+'</span><div class="stap-titel">Nog vergrendeld</div>';
      body.appendChild(slotje); body.appendChild(t); el.appendChild(body); return el;
    }

    const head=document.createElement("div"); head.className="stap-head";
    head.innerHTML='<span class="nummer">Stap '+(index+1)+(isAf?' ✓':'')+'</span>';
    if (isAf){ const chev=document.createElement("span"); chev.className="chev"; chev.textContent="▸"; head.appendChild(chev); }
    body.appendChild(head);
    if (stap.titel && stap.titel.trim()){
      const titel=document.createElement("div"); titel.className="stap-titel";
      titel.textContent=stap.titel; body.appendChild(titel);
    }

    // Inhoud (route, opdracht, foto): zichtbaar bij de huidige stap en
    // in/uitklapbaar bij reeds afgeronde stappen.
    if (stap.route && stap.route.trim()){
      const route=document.createElement("div"); route.className="route";
      route.innerHTML='<span class="label">Route</span><p></p>';
      route.querySelector("p").textContent=stap.route; body.appendChild(route);
    }
    if (stap.opdracht && stap.opdracht.trim()){
      const opd=document.createElement("div"); opd.className="opdracht";
      opd.innerHTML='<span class="label">Opdracht</span><p></p>';
      opd.querySelector("p").textContent=stap.opdracht; body.appendChild(opd);
    }
    if (stap.foto){
      const fig=document.createElement("figure"); fig.className="fotoblok";
      const img=document.createElement("img");
      img.src=stap.foto; img.alt=stap.fotobijschrift||"Foto"; img.loading="lazy";
      fig.appendChild(img);
      if (stap.fotobijschrift){
        const cap=document.createElement("figcaption");
        cap.textContent=stap.fotobijschrift; fig.appendChild(cap);
      }
      body.appendChild(fig);
    }

    if (!isAf){
      maakInteractie(stap,index,body);
    } else {
      // Afgeronde stap: toon het ingetypte antwoord (indien er een was) ...
      if (antwoorden[index]){
        const a=antwoorden[index];
        const ant=document.createElement("div"); ant.className="jouw-antwoord";
        ant.innerHTML='<span class="label">Jouw antwoord</span><p></p>';
        ant.querySelector("p").textContent = a.waarde + (a.correct ? "" : " — (via failsafe doorgelaten)");
        body.appendChild(ant);
      }
      // ... en klik om in/uit te klappen (terugkijken mag, doorklikken niet).
      el.addEventListener("click", ()=> el.classList.toggle("open"));
    }
    el.appendChild(body); return el;
  }

  function maakFinale(){
    const el=document.createElement("section");
    el.className="finale"+(netOntgrendeld===totaal?" onthul":"");
    const f=data.finale||{};
    el.innerHTML='<div class="vlag">'+(f.vlag||"🏁")+'</div><h2></h2><p></p>';
    el.querySelector("h2").textContent=f.titel||"Voltooid!";
    el.querySelector("p").textContent=f.tekst||"Je hebt de speurtocht afgerond.";
    return el;
  }

  function render(){
    bouwSpoor(); lijstEl.innerHTML="";
    data.stappen.forEach((s,i)=>lijstEl.appendChild(maakStap(s,i)));
    if (voltooid>=totaal){ lijstEl.appendChild(maakFinale()); finishTracking(); }
    netOntgrendeld=-1;
  }

  // ==================== Route-opname ====================
  const TRACK_KEY = "speurtocht_track_v1";
  let track=[], startTijd=null, eindTijd=null, watchId=null, afgerond=false;
  let rmap=null, rline=null, rpos=null, routeModal=null;

  try {
    const raw = localStorage.getItem(TRACK_KEY);
    if (raw){ const s=JSON.parse(raw); track=s.track||[]; startTijd=s.start||null; eindTijd=s.eind||null; afgerond=!!s.afgerond; }
  } catch(e){}

  function trackBewaar(){
    try { localStorage.setItem(TRACK_KEY, JSON.stringify({track:track,start:startTijd,eind:eindTijd,afgerond:afgerond})); } catch(e){}
  }

  function startTracking(){
    if (afgerond) return;
    if (startTijd===null){ startTijd=Date.now(); trackBewaar(); }
    if (watchId!==null || !navigator.geolocation) return;
    watchId = navigator.geolocation.watchPosition(p=>{
      const pt={lat:p.coords.latitude, lng:p.coords.longitude, t:Date.now()};
      const v=track[track.length-1];
      if (!v || afstandMeter(v.lat,v.lng,pt.lat,pt.lng) >= 3){ track.push(pt); trackBewaar(); updateKaart(); }
    }, ()=>{}, { enableHighAccuracy:true, maximumAge:5000, timeout:20000 });
  }

  function finishTracking(){
    if (afgerond) return;
    afgerond=true; eindTijd=Date.now();
    if (watchId!==null){ try{ navigator.geolocation.clearWatch(watchId);}catch(e){} watchId=null; }
    trackBewaar(); verstuurResultaat(); updateBalk();
  }

  function duurTekst(){
    if (startTijd===null) return "00:00:00";
    const eind = eindTijd || Date.now();
    let s=Math.max(0, Math.floor((eind-startTijd)/1000));
    const h=Math.floor(s/3600); s-=h*3600; const m=Math.floor(s/60); s-=m*60;
    const pad=n=>String(n).padStart(2,"0");
    return pad(h)+":"+pad(m)+":"+pad(s);
  }

  function verstuurResultaat(){
    const ep = data.resultatenEndpoint;
    if (!ep || startTijd===null || eindTijd===null) return;
    const payload={ start:new Date(startTijd).toISOString(), eind:new Date(eindTijd).toISOString(),
      duurSeconden:Math.round((eindTijd-startTijd)/1000), duur:duurTekst() };
    try { fetch(ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}); } catch(e){}
  }

  function downloadGPX(){
    let g='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Speurtocht Kimberly" xmlns="http://www.topografix.com/GPX/1/1">\n<trk><name>Speurtocht Kimberly</name><trkseg>\n';
    track.forEach(p=>{ g+='<trkpt lat="'+p.lat+'" lon="'+p.lng+'"><time>'+new Date(p.t).toISOString()+'</time></trkpt>\n'; });
    g+='</trkseg></trk></gpx>\n';
    const blob=new Blob([g],{type:'application/gpx+xml'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="speurtocht-route.gpx";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  }

  function openKaart(){
    if (typeof L==="undefined") return;
    if (!rmap){
      rmap = L.map("route-map");
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap-bijdragers'}).addTo(rmap);
      rline = L.polyline([], {color:'#e8a33d', weight:4}).addTo(rmap);
      rmap.setView([51.4994,3.616],15);
    }
    setTimeout(()=>{ if(rmap){ rmap.invalidateSize(); } updateKaart(); },120);
  }

  function updateKaart(){
    if (!rmap || !rline) return;
    const pts=track.map(p=>[p.lat,p.lng]);
    rline.setLatLngs(pts);
    if (pts.length){
      const laatste=pts[pts.length-1];
      if (!rpos){ rpos=L.circleMarker(laatste,{radius:7,color:'#fff',weight:2,fillColor:'#e07a5f',fillOpacity:1}).addTo(rmap); }
      else rpos.setLatLng(laatste);
      try { rmap.fitBounds(pts,{padding:[30,30],maxZoom:17}); } catch(e){}
    }
    updateBalk();
  }

  function updateBalk(){
    if (!routeModal) return;
    const tEl=routeModal.querySelector(".route-tijd"); if (tEl) tEl.textContent=duurTekst();
    const dl=routeModal.querySelector(".route-dl"); if (dl) dl.style.display = afgerond ? "inline-block" : "none";
    const st=routeModal.querySelector(".route-status");
    if (st) st.textContent = afgerond ? "Route vastgezet ✓" : (track.length ? "Route wordt opgenomen…" : "Wachtend op locatie…");
  }

  function bouwRouteUI(){
    const knop=document.createElement("button"); knop.className="route-knop"; knop.textContent="🗺️ Mijn route";
    document.body.appendChild(knop);
    routeModal=document.createElement("div"); routeModal.className="route-modal";
    routeModal.innerHTML =
      '<header><b>Mijn route</b><button class="route-sluit" aria-label="Sluiten">×</button></header>'+
      '<div id="route-map"></div>'+
      '<div class="balk"><span class="route-status"></span>'+
      '<span>Tijd: <span class="route-tijd">00:00:00</span></span>'+
      '<button class="route-dl" style="display:none">Download (GPX)</button></div>';
    document.body.appendChild(routeModal);
    knop.addEventListener("click", ()=>{ routeModal.classList.add("open"); openKaart(); });
    routeModal.querySelector(".route-sluit").addEventListener("click", ()=> routeModal.classList.remove("open"));
    routeModal.querySelector(".route-dl").addEventListener("click", downloadGPX);
    setInterval(()=>{ if (routeModal.classList.contains("open")) updateBalk(); }, 1000);
    updateBalk();
  }
  // =====================================================

  document.getElementById("reset").addEventListener("click",()=>{
    if (confirm("Weet je zeker dat je opnieuw wilt beginnen? Alle voortgang gaat verloren.")){
      voltooid=0; bewaar();
      antwoorden={}; try { localStorage.removeItem(ANTW); } catch(e){}
      for (const k in gpsGehaald) delete gpsGehaald[k];
      track=[]; startTijd=null; eindTijd=null; afgerond=false;
      if (watchId!==null){ try{navigator.geolocation.clearWatch(watchId);}catch(e){} watchId=null; }
      try { localStorage.removeItem(TRACK_KEY); } catch(e){}
      if (rline) rline.setLatLngs([]);
      startTracking();
      render(); window.scrollTo({top:0,behavior:"smooth"});
    }
  });

  // --- Wachtwoordscherm ---
  const TOEGANG = "speurtocht_toegang_v1";
  const gate = document.getElementById("slot-scherm");
  document.getElementById("slot-titel").textContent = data.titel;

  let heeftToegang = false;
  try { heeftToegang = localStorage.getItem(TOEGANG) === "ok"; } catch(e){}
  if (!data.wachtwoord) heeftToegang = true;

  if (heeftToegang){
    gate.hidden = true;
    startTracking();
  } else {
    const gInput = document.getElementById("slot-input");
    const gKnop  = document.getElementById("slot-knop");
    const gFout  = document.getElementById("slot-fout");
    function probeerWachtwoord(){
      if (normaliseer(gInput.value) === normaliseer(data.wachtwoord)){
        try { localStorage.setItem(TOEGANG, "ok"); } catch(e){}
        gate.hidden = true;
        startTracking();
      } else {
        gFout.style.display = "block"; gInput.focus(); gInput.select();
      }
    }
    gKnop.addEventListener("click", probeerWachtwoord);
    gInput.addEventListener("keydown", e=>{ if (e.key==="Enter") probeerWachtwoord(); });
    gInput.addEventListener("input", ()=>{ gFout.style.display="none"; });
    gInput.focus();
  }

  bouwRouteUI();
  render();
})();
</script>
</body>
</html>
